services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: always
    ports:
      - "8082:8080"
    volumes:
      - /mnt/user/appdata/monitoring/dozzle:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: always
    ports:
      - "3010:3001"
    volumes:
      - /mnt/user/appdata/monitoring/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - monitoring

networks:
  monitoring:
    name: monitoring_net
    driver: bridge
